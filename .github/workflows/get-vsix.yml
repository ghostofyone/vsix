name: Fetch VS Code Extension VSIX

on:
  workflow_dispatch:
    inputs:
      extension_id:
        description: 'VS Code extension ID (e.g. ronco-jhon.better-context-to-ai)'
        required: true
        type: string

permissions:
  contents: write       # Needed to push the downloaded file

jobs:
  download-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get extension metadata and download VSIX
        id: fetch
        env:
          EXT_ID: ${{ inputs.extension_id }}
        run: |
          # 1. Query the Marketplace for the latest version
          RESPONSE=$(curl -s -X POST "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json;api-version=3.0-preview.1" \
            -d '{
              "filters": [{
                "criteria": [{ "filterType": 7, "value": "'"$EXT_ID"'" }],
                "pageSize": 1
              }],
              "flags": 131
            }')

          # 2. Extract the download URL (first VSIX asset) and version number
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.results[0].extensions[0].versions[0].files[] | select(.assetType=="Microsoft.VisualStudio.Services.VSIXPackage") | .source')
          VERSION=$(echo "$RESPONSE" | jq -r '.results[0].extensions[0].versions[0].version')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::Could not find VSIX download URL for $EXT_ID"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          # 3. Download the VSIX into the repo root
          FILE_NAME="${EXT_ID}-${VERSION}.vsix"
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

          curl -L -o "$FILE_NAME" "$DOWNLOAD_URL"
          echo "VSIX saved as $FILE_NAME"

      - name: Commit and push VSIX file
        env:
          FILE_NAME: ${{ steps.fetch.outputs.file_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE_NAME"
          git commit -m "Add $FILE_NAME" || echo "No changes to commit"
          git push
